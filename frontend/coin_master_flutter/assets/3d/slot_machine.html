<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, maximum-scale=1">
  <title>3D Slot Machine</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #0a0518;
      width: 100%;
      height: 100%;
      touch-action: none;
    }
    #scene {
      display: block;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <canvas id="scene"></canvas>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script>
    // ════════════════════════════════════════════════════════════
    // Three.js 3D Slot Machine — Coin Master Style
    // Real 3D cylindrical reels, PBR gold frame, dynamic lighting
    // ════════════════════════════════════════════════════════════

    const canvas = document.getElementById('scene');
    const SYMBOLS = ['\uD83D\uDCB0', '\u2694\uFE0F', '\uD83D\uDC37', '\uD83D\uDEE1\uFE0F', '\u26A1', '\uD83C\uDFB0'];
    const N_SYM = SYMBOLS.length;

    // ── Scene / Camera / Renderer ──
    const scene = new THREE.Scene();
    scene.background = null;

    const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0.3, 5.2);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({
      canvas: canvas,
      antialias: true,
      alpha: true,
      powerPreference: 'high-performance'
    });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.1;

    // ── Lighting ──
    const ambient = new THREE.AmbientLight(0x6a1b9a, 0.45);
    scene.add(ambient);

    const keyLight = new THREE.DirectionalLight(0xfff4d4, 1.3);
    keyLight.position.set(3, 4, 5);
    keyLight.castShadow = true;
    keyLight.shadow.mapSize.width = 1024;
    keyLight.shadow.mapSize.height = 1024;
    keyLight.shadow.camera.near = 0.5;
    keyLight.shadow.camera.far = 20;
    keyLight.shadow.bias = -0.001;
    scene.add(keyLight);

    const goldRim = new THREE.PointLight(0xffc107, 2.5, 8);
    goldRim.position.set(-2.5, 1, 2.5);
    scene.add(goldRim);

    const purpleRim = new THREE.PointLight(0x7b2fbe, 2, 8);
    purpleRim.position.set(2.5, -1, 2.5);
    scene.add(purpleRim);

    const fillLight = new THREE.PointLight(0xffffff, 0.6, 6);
    fillLight.position.set(0, 0, 3);
    scene.add(fillLight);

    // ── Materials ──
    const goldMat = new THREE.MeshStandardMaterial({
      color: 0xffd700,
      metalness: 0.9,
      roughness: 0.18,
      emissive: 0x332200,
      emissiveIntensity: 0.25
    });

    const darkGoldMat = new THREE.MeshStandardMaterial({
      color: 0xff8f00,
      metalness: 0.85,
      roughness: 0.25
    });

    const interiorMat = new THREE.MeshStandardMaterial({
      color: 0x0a0520,
      metalness: 0.2,
      roughness: 0.7
    });

    const reelBodyMat = new THREE.MeshStandardMaterial({
      color: 0x1c0a40,
      metalness: 0.3,
      roughness: 0.6
    });

    // ── Cabinet Group ──
    const cabinet = new THREE.Group();
    scene.add(cabinet);

    // Gold bezel frame using extruded shape (with hole cut-out for the display)
    function makeFrame() {
      const W = 4.0, H = 2.7;
      const HW = 3.2, HH = 1.9;
      const shape = new THREE.Shape();
      const R = 0.3;
      // Rounded rect path
      shape.moveTo(-W/2 + R, -H/2);
      shape.lineTo(W/2 - R, -H/2);
      shape.quadraticCurveTo(W/2, -H/2, W/2, -H/2 + R);
      shape.lineTo(W/2, H/2 - R);
      shape.quadraticCurveTo(W/2, H/2, W/2 - R, H/2);
      shape.lineTo(-W/2 + R, H/2);
      shape.quadraticCurveTo(-W/2, H/2, -W/2, H/2 - R);
      shape.lineTo(-W/2, -H/2 + R);
      shape.quadraticCurveTo(-W/2, -H/2, -W/2 + R, -H/2);

      const hole = new THREE.Path();
      const HR = 0.18;
      hole.moveTo(-HW/2 + HR, -HH/2);
      hole.lineTo(HW/2 - HR, -HH/2);
      hole.quadraticCurveTo(HW/2, -HH/2, HW/2, -HH/2 + HR);
      hole.lineTo(HW/2, HH/2 - HR);
      hole.quadraticCurveTo(HW/2, HH/2, HW/2 - HR, HH/2);
      hole.lineTo(-HW/2 + HR, HH/2);
      hole.quadraticCurveTo(-HW/2, HH/2, -HW/2, HH/2 - HR);
      hole.lineTo(-HW/2, -HH/2 + HR);
      hole.quadraticCurveTo(-HW/2, -HH/2, -HW/2 + HR, -HH/2);
      shape.holes.push(hole);

      const geom = new THREE.ExtrudeGeometry(shape, {
        depth: 0.45,
        bevelEnabled: true,
        bevelThickness: 0.08,
        bevelSize: 0.06,
        bevelSegments: 4,
        curveSegments: 16
      });
      geom.center();
      const mesh = new THREE.Mesh(geom, goldMat);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      return mesh;
    }
    const frame = makeFrame();
    frame.position.z = 0.1;
    cabinet.add(frame);

    // Dark interior backdrop
    const backdrop = new THREE.Mesh(
      new THREE.PlaneGeometry(3.2, 1.9),
      interiorMat
    );
    backdrop.position.z = -0.15;
    backdrop.receiveShadow = true;
    cabinet.add(backdrop);

    // Decorative studs on the frame corners
    function makeStud(x, y) {
      const g = new THREE.SphereGeometry(0.09, 16, 16);
      const s = new THREE.Mesh(g, goldMat);
      s.position.set(x, y, 0.35);
      s.castShadow = true;
      cabinet.add(s);
    }
    makeStud(-1.85, 1.2); makeStud(1.85, 1.2);
    makeStud(-1.85, -1.2); makeStud(1.85, -1.2);

    // ── Symbol Textures (emoji rendered to canvas) ──
    function createSymbolTexture(emoji, bgColor) {
      const c = document.createElement('canvas');
      c.width = 512; c.height = 512;
      const ctx = c.getContext('2d');

      // Background gradient
      const grd = ctx.createRadialGradient(256, 256, 40, 256, 256, 280);
      grd.addColorStop(0, bgColor);
      grd.addColorStop(1, '#0a0518');
      ctx.fillStyle = grd;
      ctx.fillRect(0, 0, 512, 512);

      // Gold border
      ctx.strokeStyle = '#ffd700';
      ctx.lineWidth = 6;
      ctx.strokeRect(8, 8, 496, 496);

      // Emoji
      ctx.font = '340px "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.shadowColor = 'rgba(0,0,0,0.6)';
      ctx.shadowBlur = 12;
      ctx.shadowOffsetY = 6;
      ctx.fillText(emoji, 256, 280);

      const tex = new THREE.CanvasTexture(c);
      tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
      tex.colorSpace = THREE.SRGBColorSpace;
      return tex;
    }

    const SYM_BG = ['#4a148c','#d50000','#ff6d00','#006064','#f57f17','#4a148c'];
    const symTextures = SYMBOLS.map((s, i) => createSymbolTexture(s, SYM_BG[i]));

    // ── Create 3D Cylindrical Reel ──
    function createReel() {
      const reel = new THREE.Group();
      const radius = 0.55;

      // Cylinder body (sides hidden by symbol planes)
      const body = new THREE.Mesh(
        new THREE.CylinderGeometry(radius * 0.98, radius * 0.98, 0.85, 20),
        reelBodyMat
      );
      body.rotation.z = Math.PI / 2; // lay horizontally
      body.castShadow = true;
      body.receiveShadow = true;
      reel.add(body);

      // End caps (gold)
      const capL = new THREE.Mesh(
        new THREE.CircleGeometry(radius * 1.02, 24),
        darkGoldMat
      );
      capL.position.x = -0.43;
      capL.rotation.y = -Math.PI / 2;
      reel.add(capL);

      const capR = capL.clone();
      capR.position.x = 0.43;
      capR.rotation.y = Math.PI / 2;
      reel.add(capR);

      // Symbol ring — planes arranged around the X-axis
      const symbolRing = new THREE.Group();
      for (let i = 0; i < N_SYM; i++) {
        const angle = (i / N_SYM) * Math.PI * 2;
        const mat = new THREE.MeshStandardMaterial({
          map: symTextures[i],
          side: THREE.DoubleSide,
          metalness: 0.15,
          roughness: 0.6,
          emissive: 0x222222,
          emissiveIntensity: 0.15
        });
        const plane = new THREE.Mesh(
          new THREE.PlaneGeometry(0.7, 0.7),
          mat
        );
        plane.position.y = Math.sin(angle) * radius;
        plane.position.z = Math.cos(angle) * radius;
        plane.rotation.x = angle;
        plane.castShadow = true;
        plane.receiveShadow = true;
        symbolRing.add(plane);
      }
      reel.add(symbolRing);
      reel.userData.symbolRing = symbolRing;
      return reel;
    }

    const reels = [];
    const reelState = [];
    for (let i = 0; i < 3; i++) {
      const reel = createReel();
      reel.position.x = (i - 1) * 1.05;
      reel.position.z = 0.1;
      cabinet.add(reel);
      reels.push(reel);
      reelState.push({
        angle: 0,
        speed: 0,
        spinning: false,
        decelling: false,
        decelStartTime: 0,
        decelDuration: 900,
        startAngle: 0,
        targetAngle: 0,
        notifiedStop: false,
        targetSymbol: 0
      });
    }

    // ── Pay-line markers (glowing gold arrows on sides) ──
    function makeArrow(x) {
      const arrowShape = new THREE.Shape();
      const sign = Math.sign(x);
      arrowShape.moveTo(-0.12 * sign, 0);
      arrowShape.lineTo(0.08 * sign, 0.10);
      arrowShape.lineTo(0.08 * sign, -0.10);
      arrowShape.lineTo(-0.12 * sign, 0);
      const geom = new THREE.ExtrudeGeometry(arrowShape, {
        depth: 0.06, bevelEnabled: true, bevelThickness: 0.02, bevelSize: 0.02, bevelSegments: 2
      });
      const mat = new THREE.MeshStandardMaterial({
        color: 0xffd700, metalness: 0.9, roughness: 0.2,
        emissive: 0xffa000, emissiveIntensity: 0.8
      });
      const m = new THREE.Mesh(geom, mat);
      m.position.set(x, 0, 0.3);
      m.castShadow = true;
      cabinet.add(m);
    }
    makeArrow(-1.75);
    makeArrow(1.75);

    // ── Spin Logic ──
    let animTime = 0;
    let flutterReady = false;
    function notifyFlutter(payload) {
      if (window.FlutterBridge) {
        window.FlutterBridge.postMessage(JSON.stringify(payload));
      }
    }

    function startSpin() {
      const now = performance.now();
      reelState.forEach((s, i) => {
        s.spinning = true;
        s.decelling = false;
        s.notifiedStop = false;
        s.speed = 18 + i * 3; // rad/sec
      });
    }
    window.startSpin = startSpin;

    function stopReels(s1, s2, s3) {
      const targets = [s1 | 0, s2 | 0, s3 | 0];
      const now = performance.now();
      reelState.forEach((s, i) => {
        s.targetSymbol = targets[i];
        s.decelling = true;
        s.decelStartTime = now + i * 420; // stagger: reel 0, 1, 2 stop in order
        s.startAngle = s.angle;
        const anglePerSym = (Math.PI * 2) / N_SYM;
        const rotations = 2 + i * 0.5; // extra rotations for drama
        // Symbol index 0 = visible when angle = 0, increases with rotation forward
        const desired = -targets[i] * anglePerSym;
        // Normalize start angle to 0..2PI
        let base = s.startAngle % (Math.PI * 2);
        if (base < 0) base += Math.PI * 2;
        const fullTurns = rotations * Math.PI * 2;
        s.targetAngle = s.startAngle + fullTurns + (desired - (s.startAngle % (Math.PI * 2))) % (Math.PI * 2);
        // Ensure forward motion
        while (s.targetAngle <= s.startAngle + Math.PI) {
          s.targetAngle += Math.PI * 2;
        }
        s.decelDuration = 700 + i * 150;
      });
    }
    window.stopReels = stopReels;

    // Ease out cubic
    function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

    // ── Animation loop ──
    let lastFrame = performance.now();
    function animate() {
      requestAnimationFrame(animate);
      const now = performance.now();
      const dt = Math.min((now - lastFrame) / 1000, 0.05);
      lastFrame = now;
      animTime += dt;

      // Gentle float of the whole cabinet
      cabinet.position.y = Math.sin(animTime * 1.2) * 0.02;
      cabinet.rotation.y = Math.sin(animTime * 0.7) * 0.02;

      // Animate golden rim light orbit
      goldRim.position.x = Math.cos(animTime * 0.6) * 2.5;
      goldRim.position.y = Math.sin(animTime * 0.6) * 1;

      reelState.forEach((s, i) => {
        if (s.spinning && !s.decelling) {
          s.angle += s.speed * dt;
        } else if (s.decelling) {
          if (now < s.decelStartTime) {
            s.angle += s.speed * dt;
          } else {
            const elapsed = now - s.decelStartTime;
            const p = Math.min(elapsed / s.decelDuration, 1);
            const eased = easeOutCubic(p);
            s.angle = s.startAngle + (s.targetAngle - s.startAngle) * eased;
            if (p >= 1) {
              s.spinning = false;
              s.decelling = false;
              if (!s.notifiedStop) {
                s.notifiedStop = true;
                notifyFlutter({ type: 'reel_stopped', reel: i });
              }
            }
          }
        }
        const ring = reels[i].userData.symbolRing;
        if (ring) ring.rotation.x = s.angle;
      });

      renderer.render(scene, camera);
    }

    // ── Resize handling ──
    function handleResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }
    window.addEventListener('resize', handleResize);

    // Let Flutter know we're ready
    setTimeout(() => {
      flutterReady = true;
      notifyFlutter({ type: 'ready' });
    }, 100);

    animate();
  </script>
</body>
</html>
