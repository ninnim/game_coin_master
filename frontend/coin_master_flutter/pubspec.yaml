name: coin_master_flutter
description: Spin Empire - Coin Master Clone with Better UI, Sound, and Effects

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # Game Engine
  flame: ^1.17.0
  flame_audio: ^2.10.0

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # Network
  dio: ^5.4.3
  signalr_netcore: ^1.3.6

  # Storage
  flutter_secure_storage: ^9.0.0

  # UI & Animations
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # Utils
  intl: ^0.19.0
  vibration: ^3.1.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/slots/
    - assets/images/ui/
    - assets/audio/
